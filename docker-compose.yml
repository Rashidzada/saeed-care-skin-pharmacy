services:
  db:
    image: postgres:15-alpine
    container_name: msms_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-msms_db}
      POSTGRES_USER: ${DB_USER:-msms_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-msms_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-msms_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: msms_backend
    restart: unless-stopped
    environment:
      - DJANGO_SETTINGS_MODULE=msms_project.settings.dev
      - DB_NAME=${DB_NAME:-msms_db}
      - DB_USER=${DB_USER:-msms_user}
      - DB_PASSWORD=${DB_PASSWORD:-msms_pass}
      - DB_HOST=db
      - DB_PORT=5432
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me-in-production-xyz123}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1,backend}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:5151,http://localhost:3000}
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn msms_project.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: msms_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL:-http://localhost:8000}

volumes:
  postgres_data:
  static_files:
  media_files:
